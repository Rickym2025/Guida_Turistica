<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida Turistica Delta del Po</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    
    <style>
        :root { --glass: rgba(255, 255, 255, 0.15); }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Outfit', sans-serif; overflow: hidden; color: white; }

        /* Video Sfondo */
        #bg-video {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -2; object-fit: cover; filter: brightness(50%) saturate(1.2);
        }

        .container {
            display: flex; align-items: center; justify-content: center; height: 100vh;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%);
        }

        /* Card Glass 3D */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.1);
            max-width: 450px; width: 90%;
            transition: transform 0.5s ease;
        }

        h1 { font-size: 2.8rem; margin: 10px 0; font-weight: 700; letter-spacing: -1px; }
        .subtitle { opacity: 0.7; font-size: 1.1rem; margin-bottom: 40px; }

        /* Radar Animato Evoluto */
        .radar-box {
            position: relative; width: 120px; height: 120px; margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center; font-size: 50px;
            background: rgba(255,255,255,0.1); border-radius: 50%;
        }
        .pulse {
            position: absolute; width: 100%; height: 100%; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }

        /* Pulsante Moderno */
        .btn-start {
            background: white; color: #004d40; border: none; padding: 20px 40px;
            font-size: 1.2rem; font-weight: 700; border-radius: 30px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn-start:hover { transform: scale(1.05); }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

        #status { margin-top: 25px; font-size: 0.9rem; letter-spacing: 1px; opacity: 0.8; }
    </style>
</head>

<body>

    <video autoplay muted loop id="bg-video" playsinline>
    <source src="video_chioggia.mp4" type="video/mp4">
    Il tuo browser non supporta il tag video.
</video>

    <div class="container">
        <div class="glass-card">
            <div class="radar-box" id="radar">
                <div class="pulse"></div>
                <span id="icon">🌍</span>
            </div>
            <h1>Guida del Delta</h1>
            <p class="subtitle">Intelligenza artificiale locale.<br>Inquadra, clicca e parla.</p>
            <button id="startBtn" class="btn-start">📍 Avvia la Guida</button>
            <div id="status">Pronta per connettersi</div>
        </div>
    </div>

    <script>
        const url = "wss://n8n-97js9kpk.livekit.cloud"; 
        const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiVHVyaXN0YSIsInZpZGVvIjp7InJvb21Kb2luIjp0cnVlLCJyb29tIjoiZGVsdGEtcG8tdGVzdCIsImNhblB1Ymxpc2giOnRydWUsImNhblN1YnNjcmliZSI6dHJ1ZSwiY2FuUHVibGlzaERhdGEiOnRydWV9LCJzdWIiOiJ0dXJpc3RhIiwiaXNzIjoiQVBJbXpBRjdOQ2YyRWZiIiwibmJmIjoxNzczNDc4MTAzLCJleHAiOjE4MDUwMTQxMDN9.5lw4nd3MpC0IV50Yi5EUoUy1dvmho2uF3Ir2G4Uqfbo"; 

        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const icon = document.getElementById('icon');

        btn.onclick = async () => {
            btn.disabled = true;
            status.innerText = "📡 Rilevamento GPS in corso...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                status.innerText = "✅ Posizione acquisita. Connessione...";
                
                try {
                    const room = new LivekitClient.Room();
                    room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                        if (track.kind === 'audio') track.attach();
                    });

                    await room.connect(url, token);
                    await room.startAudio();

                    const gpsData = JSON.stringify({ tipo: 'gps', lat: pos.coords.latitude, lon: pos.coords.longitude });
                    await room.localParticipant.publishData(new TextEncoder().encode(gpsData), { reliable: true });
                    await room.localParticipant.setMicrophoneEnabled(true);
                    
                    status.innerText = "🎙️ Livia è online. Parla pure!";
                    icon.innerText = "🎙️";
                    btn.style.display = "none";
                } catch (e) {
                    status.innerText = "❌ Errore server";
                    btn.disabled = false;
                }
            }, () => { status.innerText = "❌ GPS Negato"; btn.disabled = false; });
        };
    </script>
</body>
</html>
