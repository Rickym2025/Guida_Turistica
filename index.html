<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida Turistica Delta del Po</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    
    <style>
        :root { --glass: rgba(255, 255, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Outfit', sans-serif; overflow: hidden; color: white; }
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -2; object-fit: cover; filter: brightness(40%) saturate(1.2); }
        .container { display: flex; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%); }
        .glass-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 40px; padding: 50px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.4); max-width: 400px; width: 90%; }
        h1 { font-size: 2.5rem; margin: 10px 0; font-weight: 700; }
        .subtitle { opacity: 0.8; font-size: 1rem; margin-bottom: 30px; }
        
        /* Form Utente */
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px 20px; border-radius: 20px; border: none; background: rgba(255,255,255,0.9); font-family: 'Outfit'; font-size: 1rem; outline: none; }
        
        .btn-start { background: white; color: #004d40; border: none; padding: 15px 35px; font-size: 1.1rem; font-weight: 700; border-radius: 30px; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 0.9rem; opacity: 0.9; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video" playsinline>
        <source src="video_chioggia.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="glass-card">
            <h1>Guida del Delta</h1>
            <p class="subtitle">La tua guida vocale intelligente.</p>
            
            <div class="input-group" id="userForm">
                <input type="text" id="userName" placeholder="Il tuo Nome (Opzionale)">
                <input type="email" id="userEmail" placeholder="La tua Email per sconti (Opzionale)">
            </div>

            <button id="startBtn" class="btn-start">📍 Avvia la Guida</button>
            <div id="status">Pronta per connettersi</div>
        </div>
    </div>

    <script>
        // Sostituisci con URL e Token corretti generati dal tuo server
        const url = "wss://n8n-97js9kpk.livekit.cloud"; 
        const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiVHVyaXN0YSIsInZpZGVvIjp7InJvb21Kb2luIjp0cnVlLCJyb29tIjoiZGVsdGEtcG8tdGVzdCIsImNhblB1Ymxpc2giOnRydWUsImNhblN1YnNjcmliZSI6dHJ1ZSwiY2FuUHVibGlzaERhdGEiOnRydWV9LCJzdWIiOiJ0dXJpc3RhIiwiaXNzIjoiQVBJbXpBRjdOQ2YyRWZiIiwibmJmIjoxNzczNDc4MTAzLCJleHAiOjE4MDUwMTQxMDN9.5lw4nd3MpC0IV50Yi5EUoUy1dvmho2uF3Ir2G4Uqfbo"; 

        const btn = document.getElementById('startBtn');
    const status = document.getElementById('status');

    // Assicuriamoci che l'audio non venga bloccato dal browser creando un div nascosto
    const audioContainer = document.createElement('div');
    audioContainer.id = "audio-container";
    document.body.appendChild(audioContainer);

    btn.onclick = async () => {
        btn.disabled = true;
        status.innerText = "📡 Rilevamento GPS in corso...";
        
        const nomeInput = document.getElementById('userName');
        const emailInput = document.getElementById('userEmail');
        // Usiamo trim() per eliminare spazi vuoti accidentali inseriti dall'utente
        const nome = nomeInput ? nomeInput.value.trim() : "";
        const email = emailInput ? emailInput.value.trim() : "";
        
        const userForm = document.getElementById('userForm');
        if (userForm) userForm.style.display = 'none';

        navigator.geolocation.getCurrentPosition(async (pos) => {
            status.innerText = "✅ Posizione acquisita. Connessione...";
            await avviaConnessione(pos.coords.latitude, pos.coords.longitude, nome, email);
        }, async (err) => { 
            console.warn("GPS fallito:", err);
            status.innerText = "⚠️ GPS Negato. Uso posizione generica."; 
            await avviaConnessione(44.67, 12.18, nome, email);
        });
    };

    async function avviaConnessione(lat, lon, nome, email) {
        try {
            const room = new LivekitClient.Room();
            
            room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                if (track.kind === 'audio') {
                    const audioElement = track.attach();
                    audioContainer.appendChild(audioElement);
                }
            });

            await room.connect(url, token);
            await room.startAudio();
            await room.localParticipant.setMicrophoneEnabled(true);

            const spedisciDati = async () => {
                const gpsData = JSON.stringify({ 
                    tipo: 'gps', lat: lat, lon: lon, nome: nome, email: email 
                });
                await room.localParticipant.publishData(new TextEncoder().encode(gpsData), { reliable: true });
                console.log("✅ Pacchetto dati inviato:", gpsData);
            };

            if (room.participants.size > 0) {
                setTimeout(spedisciDati, 500);
            } else {
                room.on(LivekitClient.RoomEvent.ParticipantConnected, () => {
                    setTimeout(spedisciDati, 1000); 
                });
            }
            
            status.innerText = "🎙️ Livia è online. Parla pure!";
            btn.style.display = "none";

        } catch (e) {
            console.error("Errore Dettagliato LiveKit:", e);
            // ORA VEDRAI L'ERRORE ESATTO A SCHERMO
            status.innerText = "❌ Errore: " + (e.message || "Connessione fallita");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
