<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida Turistica Delta del Po</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* Video di sfondo */
        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -2;
            object-fit: cover;
            filter: brightness(40%);
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,77,64,0.4) 0%, rgba(0,0,0,0.6) 100%);
            z-index: -1;
        }

        .container {
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            color: #fff;
            max-width: 400px;
            width: 85%;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { opacity: 0.8; margin-bottom: 30px; }

        .btn-3d {
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            background: #00897b;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0 #004d40;
            transition: all 0.1s;
        }
        .btn-3d:active { transform: translateY(8px); box-shadow: 0 2px 0 #004d40; }
        .btn-3d:disabled { background: #555; box-shadow: none; cursor: wait; }

        #status { margin-top: 25px; font-weight: 600; min-height: 20px; color: #b2dfdb; }
    </style>
</head>

<body>

    <video autoplay muted loop id="bg-video">
        <!-- Puoi sostituire questo link con il video del tuo Delta -->
        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="container">
        <div class="glass-card">
            <h1>Guida del Delta</h1>
            <p class="subtitle">Livia, la tua guida digitale.</p>
            <button id="startBtn" class="btn-3d">📍 Avvia la Guida</button>
            <div id="status"></div>
        </div>
    </div>

    <script>
        const url = "wss://n8n-97js9kpk.livekit.cloud"; 
        const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiVHVyaXN0YSIsInZpZGVvIjp7InJvb21Kb2luIjp0cnVlLCJyb29tIjoiZGVsdGEtcG8tdGVzdCIsImNhblB1Ymxpc2giOnRydWUsImNhblN1YnNjcmliZSI6dHJ1ZSwiY2FuUHVibGlzaERhdGEiOnRydWV9LCJzdWIiOiJ0dXJpc3RhIiwiaXNzIjoiQVBJbXpBRjdOQ2YyRWZiIiwibmJmIjoxNzczNDc4MTAzLCJleHAiOjE4MDUwMTQxMDN9.5lw4nd3MpC0IV50Yi5EUoUy1dvmho2uF3Ir2G4Uqfbo";

        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            btn.disabled = true;
            status.innerText = "📡 Rilevamento posizione...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                status.innerText = "✅ Connessione al Delta...";

                try {
                    const room = new LivekitClient.Room();

                    room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                        if (track.kind === 'audio') track.attach();
                    });

                    await room.connect(url, token);
                    await room.startAudio();

                    const gpsData = JSON.stringify({ tipo: 'gps', lat: lat, lon: lon });
                    await room.localParticipant.publishData(new TextEncoder().encode(gpsData), { reliable: true });

                    await room.localParticipant.setMicrophoneEnabled(true);
                    status.innerText = "🎧 Livia si sta connettendo...";
                    btn.innerText = "Connessa";

                } catch (e) {
                    status.innerText = "❌ Errore di connessione.";
                    btn.disabled = false;
                }
            }, () => {
                status.innerText = "❌ GPS necessario per la guida!";
                btn.disabled = false;
            });
        };
    </script>
</body>
</html>
