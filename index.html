<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guida Turistica Delta del Po</title>
    <!-- Font moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Libreria LiveKit -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #00796b;
            --primary-dark: #004d40;
            --bg-gradient-1: #004d40;
            --bg-gradient-2: #80cbc4;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Sfondo animato moderno */
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            background-size: 200% 200%;
            animation: gradientBG 10s ease infinite;
            color: #fff;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Effetto Glassmorphism (Vetro 3D) */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            transform: translateY(0);
            animation: float 6s ease-in-out infinite;
            max-width: 400px;
            width: 90%;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        p.subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        /* Animazione Radar CSS 3D */
        .radar-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            z-index: 1;
        }

        .radar-container::before, .radar-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            animation: radarPulse 2s linear infinite;
            z-index: -1;
        }

        .radar-container::after {
            animation-delay: 1s;
        }

        @keyframes radarPulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Pulsante 3D */
        .btn-3d {
            padding: 18px 35px;
            font-size: 20px;
            font-weight: 600;
            font-family: inherit;
            color: white;
            background: linear-gradient(to bottom, #26a69a, #00897b);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            outline: none;
            position: relative;
            /* Effetto spessore 3D */
            box-shadow: 0 8px 0 #004d40, 0 15px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.1s;
        }

        .btn-3d:active {
            /* Effetto pressione */
            transform: translateY(8px);
            box-shadow: 0 0px 0 #004d40, 0 5px 10px rgba(0, 0, 0, 0.4);
        }

        .btn-3d:disabled {
            background: #9e9e9e;
            box-shadow: 0 8px 0 #616161;
            cursor: not-allowed;
            transform: translateY(0);
        }

        #status {
            margin-top: 25px;
            font-size: 16px;
            font-weight: 600;
            min-height: 24px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 15px;
        }
        
        /* Orbita decorativa dietro la card */
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
        }
        .circle-1 { width: 300px; height: 300px; background: #00bcd4; top: -100px; left: -100px; }
        .circle-2 { width: 400px; height: 400px; background: #4caf50; bottom: -150px; right: -100px; }
    </style>
</head>

<body>
    <!-- Elementi decorativi di sfondo -->
    <div class="decor-circle circle-1"></div>
    <div class="decor-circle circle-2"></div>

    <!-- Contenitore Principale -->
    <div class="glass-card">
        <div class="radar-container" id="icona-radar">🌿</div>
        <h1>Guida del Delta</h1>
        <p class="subtitle">La tua intelligenza artificiale locale. Inquadra, clicca e parla.</p>

        <button id="startBtn" class="btn-3d">📍 Avvia la Guida</button>
        <div id="status">Pronto per iniziare...</div>
    </div>

    <script>
        // SOSTITUISCI CON IL TUO NUOVO TOKEN QUANDO SCADE
        const url = "wss://n8n-97js9kpk.livekit.cloud"; 
        const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiVHVyaXN0YSIsInZpZGVvIjp7InJvb21Kb2luIjp0cnVlLCJyb29tIjoiZGVsdGEtcG8tdGVzdCIsImNhblB1Ymxpc2giOnRydWUsImNhblN1YnNjcmliZSI6dHJ1ZSwiY2FuUHVibGlzaERhdGEiOnRydWV9LCJzdWIiOiJ0dXJpc3RhIiwiaXNzIjoiQVBJbXpBRjdOQ2YyRWZiIiwibmJmIjoxNzczNDc4MTAzLCJleHAiOjE4MDUwMTQxMDN9.5lw4nd3MpC0IV50Yi5EUoUy1dvmho2uF3Ir2G4Uqfbo"; // Incolla qui il token magico generato dal terminale

        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const radar = document.getElementById('icona-radar');

        btn.onclick = async () => {
            btn.disabled = true;
            status.innerHTML = "📡 Cerco la tua posizione GPS...";
            radar.innerHTML = "🌍"; // Cambia icona

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                status.innerHTML = `✅ Trovato! Connessione in corso...`;

                try {
                    const room = new LivekitClient.Room();

                    room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                        if (track.kind === 'audio') {
                            const audioElement = track.attach();
                            document.body.appendChild(audioElement);
                        }
                    });

                    await room.connect(url, token);
                    await room.startAudio();

                    const gpsData = JSON.stringify({ tipo: 'gps', lat: lat, lon: lon });
                    const encoder = new TextEncoder();
                    await room.localParticipant.publishData(encoder.encode(gpsData), { reliable: true });

                    await room.localParticipant.setMicrophoneEnabled(true);
                    
                    status.innerHTML = "🎙️ Sono in ascolto... Parla pure!";
                    btn.innerText = "In conversazione";
                    radar.innerHTML = "🎙️";
                    
                    // Mantiene il bottone premuto visivamente
                    btn.style.transform = "translateY(8px)";
                    btn.style.boxShadow = "0 0px 0 #004d40, 0 5px 10px rgba(0, 0, 0, 0.4)";

                } catch (e) {
                    status.innerHTML = "❌ Errore di connessione al server.";
                    console.error(e);
                    btn.disabled = false;
                    radar.innerHTML = "⚠️";
                }

            }, (err) => {
                status.innerHTML = "❌ Devi consentire la posizione GPS!";
                btn.disabled = false;
                radar.innerHTML = "❌";
            });
        };
    </script>
</body>

</html>
